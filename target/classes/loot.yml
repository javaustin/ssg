
# Randomly apply enchants to enchantable items that don't already have enchants.
simple-enchant:
  enabled: true

  enchants:
    - id: SHARPNESS
      level: 1-3 # can be integer or range of integer
      weight: 1 # integer or double/float

    - id: FIRE_ASPECT
      level: 1-3
      weight: 1

    - id: KNOCKBACK
      level: 1-2
      weight: 1

loot-tables:

  normal:
    - item: diamond_sword
      amount: 1 # can be integer or range of integer
      name: "&4God Sword"
      lore:
        - "&eFancy lore"
        - "&fa the second line"
      enchant:
        id: SHARPNESS,
        level: 1
      weight: 0.1

    - item: steak
      amount: 2-4 # can be integer or range of integer
      weight: 1
