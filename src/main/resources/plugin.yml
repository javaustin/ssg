name: ssg
version: '0.0'
main: com.carrotguy69.ssg.SpeedSG
api-version: '1.21'

depend:
  - cxyz
  - WorldEdit

softdepend:
  - PlaceholderAPI

commands:
  test:
    description: Test this command
    usage: /test <content>
    permission: "ssg.test"

  print:
    description: Print
    usage: /test <content>
    permission: "ssg.test"

  game:
    description: Create, join, or leave a SpeedSG game
    usage: /game <create | join | leave>
    permission: "ssg.game"

  team:
    description: Join or leave a SpeedSG team
    usage: /team <join | leave>
    permission: "ssg.team"

permissions:
  ssg.test:
    default: op

  ssg.print:
    default: op